<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">webui-forge-maestro icon</title>
  <desc id="desc">A forge-anvil and image-generation orchestration icon for an MCP server around Stable Diffusion WebUI Forge.</desc>
  <defs>
    <linearGradient id="bg" x1="72" y1="32" x2="440" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="0.46" stop-color="#312e81"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="hot" x1="126" y1="104" x2="390" y2="406" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="0.44" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="screen" x1="132" y1="94" x2="374" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e0f2fe"/>
      <stop offset="0.48" stop-color="#a5b4fc"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <radialGradient id="glow" cx="48%" cy="52%" r="58%">
      <stop offset="0" stop-color="#fb923c" stop-opacity="0.72"/>
      <stop offset="0.42" stop-color="#fb923c" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#fb923c" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="155%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect x="32" y="32" width="448" height="448" rx="104" fill="url(#bg)"/>
  <circle cx="258" cy="274" r="194" fill="url(#glow)"/>

  <!-- generated image / webui window -->
  <g filter="url(#shadow)">
    <rect x="102" y="82" width="308" height="246" rx="42" fill="#0f172a" stroke="#c4b5fd" stroke-width="10"/>
    <rect x="102" y="82" width="308" height="56" rx="42" fill="#312e81"/>
    <path d="M102 126 H410" stroke="#4c1d95" stroke-width="10"/>
    <circle cx="142" cy="110" r="9" fill="#fb923c"/>
    <circle cx="174" cy="110" r="9" fill="#c4b5fd"/>
    <circle cx="206" cy="110" r="9" fill="#818cf8"/>

    <rect x="134" y="158" width="244" height="136" rx="22" fill="url(#screen)"/>
    <circle cx="330" cy="194" r="24" fill="#fde68a"/>
    <path d="M140 292 L206 224 L254 268 L288 236 L374 292 Z" fill="#3730a3" opacity="0.92"/>
    <path d="M142 292 L218 238 L270 292 Z" fill="#1e3a8a" opacity="0.85"/>
  </g>

  <!-- forge anvil -->
  <g filter="url(#shadow)">
    <path d="M132 358 H298 C322 358 338 346 346 326 H390 C378 362 346 386 306 386 H272 L254 424 H174 L192 386 H132 Z"
          fill="#111827" stroke="#fed7aa" stroke-width="12" stroke-linejoin="round"/>
    <path d="M152 330 H286 C306 330 322 320 328 304 H382 C370 334 342 356 304 356 H152 Z"
          fill="#1f2937"/>
    <path d="M214 386 H254 L238 424 H190 Z" fill="#0f172a"/>
  </g>

  <!-- maestro/orchestration nodes -->
  <g stroke="#c4b5fd" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <path d="M334 346 L390 402"/>
    <path d="M334 346 L412 342"/>
    <path d="M334 346 L374 286"/>
  </g>
  <g fill="#0f172a" stroke="#fed7aa" stroke-width="9">
    <circle cx="334" cy="346" r="24"/>
    <circle cx="390" cy="402" r="20"/>
    <circle cx="412" cy="342" r="20"/>
    <circle cx="374" cy="286" r="20"/>
  </g>

  <!-- forge spark / model magic -->
  <g fill="url(#hot)">
    <path d="M244 150 C258 190 270 202 310 216 C270 230 258 242 244 282 C230 242 218 230 178 216 C218 202 230 190 244 150 Z"/>
  </g>
  <circle cx="244" cy="216" r="20" fill="#fff7ed"/>
  <circle cx="244" cy="216" r="9" fill="#ef4444"/>
</svg>
